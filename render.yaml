services:
  - type: web
    name: keyman-assistant-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: keyman-assistant-db
          property: connectionString
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: PASSWORD_RESET_FROM_EMAIL
        sync: false
      - key: SESSION_IDLE_TTL_DAYS
        value: 7

databases:
  - name: keyman-assistant-db
    plan: basic-256mb
    databaseName: keyman_assistant
    user: keyman_assistant
