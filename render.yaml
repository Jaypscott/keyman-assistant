services:
  - type: web
    name: keyman-assistant-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_DATA_FILE
        value: /var/data/auth-db.json
    disk:
      name: keyman-assistant-data
      mountPath: /var/data
      sizeGB: 1
